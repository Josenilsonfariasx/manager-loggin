services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./configs/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
    expose:
      - "4317"   # OTLP gRPC (interno)
      - "4318"   # OTLP HTTP (interno)
      - "8889"   # Prometheus metrics endpoint (interno)
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring
      - easypanel

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml -config.expand-env=true
    volumes:
      - ./configs/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    environment:
      - LOKI_RETENTION_PERIOD=${LOKI_RETENTION_PERIOD:-744h}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.3.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
    depends_on:
      - otel-collector
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    labels:
      # Diz ao Traefik qual rede usar para rotear (resolve ambiguidade com múltiplas redes)
      - "traefik.docker.network=${EASYPANEL_NETWORK:-easypanel-teste-loggin}"
    expose:
      - "3000"   # acesso externo via reverse proxy do EasyPanel
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring
      - easypanel

volumes:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  easypanel:
    external: true
    name: ${EASYPANEL_NETWORK:-easypanel-teste-loggin}
